<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Handloom Connect</title><style>
:root{--blue:#153a4a;--orange:#f28c28;--green:#168c5b;--bg:#f1f3f6;--line:#dce2e6}*{box-sizing:border-box}body{margin:0;font-family:Arial,Segoe UI,sans-serif;background:var(--bg);color:#1d2930}header{background:var(--blue);color:#fff;padding:12px max(16px,calc((100% - 1180px)/2));display:flex;gap:22px;align-items:center;position:sticky;top:0;z-index:4}.logo{font-weight:800;font-size:21px;white-space:nowrap}.logo small{display:block;color:#f5bf69;font-style:italic;font-size:10px}.search{flex:1;max-width:580px;padding:11px 14px;border:0;border-radius:4px;font-size:14px}.head-btn{border:0;background:white;color:var(--blue);border-radius:4px;padding:10px 15px;font-weight:bold;cursor:pointer;white-space:nowrap}.cartbtn{background:transparent;color:#fff;border:0;font-weight:bold;cursor:pointer;font-size:15px;white-space:nowrap}main{max-width:1180px;margin:auto;padding:22px 16px 44px}.hero{background:linear-gradient(110deg,#fee9bf,#f7c265);border-radius:8px;padding:28px 30px;margin-bottom:18px;display:flex;justify-content:space-between;gap:20px}.hero h1{margin:0 0 8px;color:#603612;font-size:29px}.hero p{margin:0;max-width:600px;line-height:1.5;color:#754d22}.trust{font-weight:bold;color:#754d22;align-self:center}.toolbar{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:14px 16px;margin-bottom:14px;border-radius:5px}.toolbar select{padding:8px;border:1px solid var(--line);border-radius:4px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:#fff;border-radius:6px;padding:12px;cursor:pointer;transition:.15s}.card:hover{box-shadow:0 4px 16px #102b381c;transform:translateY(-2px)}.photo{height:180px;border-radius:4px;background:linear-gradient(135deg,#bf593d,#f0bf60 38%,#14796e 38%,#14796e 63%,#eed07b 63%);background-size:cover;background-position:center;display:flex;align-items:end;padding:10px;color:white;font-size:11px;font-weight:bold}.title{font-size:14px;font-weight:bold;margin:11px 0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.maker{font-size:12px;color:#64747b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rating{display:inline-block;background:var(--green);color:#fff;padding:4px 6px;border-radius:3px;font-size:11px;margin:9px 0}.muted{font-size:11px;color:#78868d;margin-left:4px}.price{font-size:18px;font-weight:bold}.delivery{font-size:11px;color:#66757d;margin-top:5px}.empty{background:#fff;padding:55px;text-align:center;grid-column:1/-1}.drawer{position:fixed;right:0;top:0;height:100%;width:min(430px,100%);background:#fff;z-index:7;box-shadow:-4px 0 25px #0003;transform:translateX(105%);transition:.25s;overflow:auto}.drawer.show{transform:none}.shade{position:fixed;inset:0;background:#0007;z-index:6;display:none}.shade.show{display:block}.drawer header{position:static;background:#fff;color:var(--blue);display:flex;justify-content:space-between;padding:18px;border-bottom:1px solid var(--line)}.close{border:0;background:transparent;font-size:24px;cursor:pointer}.drawer-body{padding:18px}.line{border-bottom:1px solid var(--line);padding:12px 0}.qty{display:flex;gap:9px;align-items:center;margin-top:8px}.qty button{border:1px solid #bcc9cf;background:#fff;border-radius:3px;width:25px;height:25px;cursor:pointer}.remove{float:right;border:0;background:none;color:#c23830;cursor:pointer}.summary{background:#f7faf9;margin-top:15px;padding:14px;border-radius:5px}.summary div{display:flex;justify-content:space-between;margin:8px 0;font-size:14px}.summary .total{font-size:18px;font-weight:bold;border-top:1px dashed #bdcbc6;padding-top:11px}.checkout{width:100%;background:var(--orange);color:#fff;border:0;border-radius:4px;padding:13px;font-weight:bold;font-size:15px;cursor:pointer;margin-top:15px}.modal{display:none;position:fixed;inset:0;z-index:8;place-items:center;background:#0008;padding:18px}.modal.show{display:grid}.box{background:#fff;width:min(650px,100%);border-radius:8px;overflow:auto;max-height:94vh}.boxhead{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}.detail{display:grid;grid-template-columns:1fr 1.1fr;gap:22px;padding:22px}.detail .photo{height:290px}.detail h2{margin:0 0 8px}.detail p{font-size:14px;line-height:1.5;color:#53636a}.add{background:#ff9f27;color:#fff;border:0;border-radius:4px;padding:13px 18px;font-weight:bold;cursor:pointer;margin-top:13px}.form{padding:18px}.form h3{margin:0 0 12px}.form label{font-size:12px;font-weight:bold;display:block;margin:11px 0 5px}.form input,.form textarea,.form select{width:100%;padding:10px;border:1px solid #cbd5d9;border-radius:4px;font:inherit}.form textarea{min-height:64px}.pay{display:flex;gap:10px;font-size:13px;margin:10px 0}.success{text-align:center;padding:45px 25px}.success h2{color:var(--green)}@media(max-width:850px){.grid{grid-template-columns:repeat(2,1fr)}.hero{padding:22px}.trust{display:none}.detail{grid-template-columns:1fr}.detail .photo{height:210px}}@media(max-width:520px){header{gap:10px}.logo{font-size:16px}.head-btn{display:none}.grid{grid-template-columns:repeat(2,1fr);gap:8px}.card{padding:8px}.photo{height:125px}.hero h1{font-size:23px}.hero{padding:18px}.toolbar{font-size:13px}.search{min-width:0}.drawer{width:100%}}
</style></head><body>
<header><div class="logo">Handloom Connect<small>from weaver to your home</small></div><input class="search" id="search" placeholder="Search for sarees, fabric, weavers..." oninput="render()"><a class="head-btn" href="handloom-connect-login.html">Admin</a><button class="cartbtn" onclick="openCart()">🛒 Cart <span id="cartCount">(0)</span></button></header>
<main><section class="hero"><div><h1>Authentic handloom, directly from the maker</h1><p>Discover heritage weaves from Dhalaptura village. Every purchase supports a traditional weaver and their craft.</p></div><div class="trust">✓ Handmade<br>✓ Direct from weaver<br>✓ Secure checkout</div></section><div class="toolbar"><strong id="resultCount">0 products</strong><select id="category" onchange="render()"><option value="">All products</option><option>Saree</option><option>Fabric</option><option>Stole / Dupatta</option><option>Home textile</option><option>Other</option></select></div><section class="grid" id="grid"></section></main>
<div class="shade" id="shade" onclick="closeCart()"></div><aside class="drawer" id="drawer"><header><strong>Your cart</strong><button class="close" onclick="closeCart()">×</button></header><div id="cartBody" class="drawer-body"></div></aside>
<div class="modal" id="modal"><div class="box" id="modalBox"></div></div>
<script>
const pkey='handloomConnectProducts',ckey='handloomConnectCart',okey='handloomConnectOrders';let products=JSON.parse(localStorage.getItem(pkey)||'[]'),cart=JSON.parse(localStorage.getItem(ckey)||'[]');const e=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const money=n=>'₹'+Number(n||0).toLocaleString('en-IN');function product(id){return products.find(x=>x.id===id)}function render(){let q=search.value.toLowerCase(),c=category.value,data=products.filter(p=>(!c||p.category===c)&&Object.values(p).join(' ').toLowerCase().includes(q));resultCount.textContent=data.length+' product'+(data.length===1?'':'s');grid.innerHTML=data.length?data.map(p=>`<article class="card" onclick="showProduct('${p.id}')"><div class="photo" ${p.photo?`style="background-image:url('${p.photo}')"`:''}>AUTHENTIC HANDLOOM</div><div class="title">${e(p.product)}</div><div class="maker">by ${e(p.weaver)}</div><span class="rating">★ ${e(p.rating||'4.6')}</span><span class="muted">${e(p.sold||'12')} bought</span><div class="price">${p.price?money(p.price):'Price on request'}</div><div class="delivery">GST included • Delivery in 5–7 days</div></article>`).join(''):'<div class="empty">No products found. Add products from the admin page.</div>';updateCartCount()}function showProduct(id){let p=product(id);modalBox.innerHTML=`<div class="boxhead"><strong>Product details</strong><button class="close" onclick="closeModal()">×</button></div><div class="detail"><div class="photo" ${p.photo?`style="background-image:url('${p.photo}')"`:''}>AUTHENTIC HANDLOOM</div><div><h2>${e(p.product)}</h2><span class="rating">★ ${e(p.rating||'4.6')}</span> <span class="muted">${e(p.sold||'12')} people bought this</span><h2 style="margin-top:14px">${p.price?money(p.price):'Price on request'}</h2><p>Material: ${e(p.material||'Handloom fabric')}<br>Woven by: ${e(p.weaver)}<br>${e(p.description||'A traditional handloom product made by skilled village artisans.')}</p><p><b>Stock:</b> ${e(p.pieces||1)} piece(s) available<br><b>Delivery:</b> Expected within 5–7 days</p><button class="add" onclick="addCart('${p.id}');closeModal()">Add to cart</button></div></div>`;modal.classList.add('show')}function closeModal(){modal.classList.remove('show')}function saveCart(){localStorage.setItem(ckey,JSON.stringify(cart));updateCartCount()}function addCart(id){let item=cart.find(x=>x.id===id),p=product(id);if(item){if(item.qty<Number(p.pieces||99))item.qty++}else cart.push({id,qty:1});saveCart()}function changeQty(id,d){let i=cart.find(x=>x.id===id),p=product(id);if(!i)return;i.qty=Math.max(1,Math.min(Number(p.pieces||99),i.qty+d));saveCart();renderCart()}function removeCart(id){cart=cart.filter(x=>x.id!==id);saveCart();renderCart()}function updateCartCount(){cartCount.textContent='('+cart.reduce((n,x)=>n+x.qty,0)+')'}function totals(){let subtotal=cart.reduce((n,x)=>n+Number(product(x.id)?.price||0)*x.qty,0),gst=Math.round(subtotal*.05),ship=subtotal>=1000?0:99;return{subtotal,gst,ship,total:subtotal+gst+ship}}function openCart(){renderCart();drawer.classList.add('show');shade.classList.add('show')}function closeCart(){drawer.classList.remove('show');shade.classList.remove('show')}function renderCart(){if(!cart.length){cartBody.innerHTML='<div class="empty">Your cart is empty.</div>';return}let t=totals();cartBody.innerHTML=cart.map(i=>{let p=product(i.id);return p?`<div class="line"><button class="remove" onclick="removeCart('${i.id}')">Remove</button><b>${e(p.product)}</b><br><small>${money(p.price)} each</small><div class="qty"><button onclick="changeQty('${i.id}',-1)">−</button><b>${i.qty}</b><button onclick="changeQty('${i.id}',1)">+</button><span style="margin-left:auto"><b>${money(Number(p.price)*i.qty)}</b></span></div></div>`:''}).join('')+`<div class="summary"><div><span>Subtotal</span><span>${money(t.subtotal)}</span></div><div><span>GST (demo 5%)</span><span>${money(t.gst)}</span></div><div><span>Shipping</span><span>${t.ship?money(t.ship):'FREE'}</span></div><div class="total"><span>Total</span><span>${money(t.total)}</span></div></div><button class="checkout" onclick="checkout()">Proceed to checkout</button>`}function checkout(){if(!cart.length)return;closeCart();modalBox.innerHTML=`<div class="boxhead"><strong>Delivery details</strong><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="placeOrder(event)"><h3>Where should we deliver?</h3><label>Full name</label><input name="name" required><label>Mobile number</label><input name="phone" required inputmode="numeric"><label>Complete address</label><textarea name="address" required></textarea><label>Village / City</label><input name="city" required><label>PIN code</label><input name="pin" required inputmode="numeric"><label>Payment method</label><div class="pay"><label><input type="radio" name="payment" value="Cash on Delivery" checked> Cash on Delivery</label><label><input type="radio" name="payment" value="Online Payment (demo)"> Online payment</label></div><div class="summary"><div class="total"><span>Final amount</span><span>${money(totals().total)}</span></div></div><button class="checkout">Place order</button></form>`;modal.classList.add('show')}function placeOrder(ev){ev.preventDefault();let f=new FormData(ev.target),t=totals(),orders=JSON.parse(localStorage.getItem(okey)||[]);orders.unshift({id:'HC'+Date.now().toString().slice(-6),date:new Date().toLocaleDateString('en-IN'),name:f.get('name'),phone:f.get('phone'),address:f.get('address'),city:f.get('city'),pin:f.get('pin'),payment:f.get('payment'),items:cart.map(i=>({product:product(i.id)?.product||'Product',qty:i.qty})),total:t.total});localStorage.setItem(okey,JSON.stringify(orders));cart=[];saveCart();modalBox.innerHTML=`<div class="success"><div style="font-size:42px">✓</div><h2>Order placed!</h2><p>Your order has been sent to the Handloom Connect admin. The product will be shipped to your address within 5–7 days.</p><button class="add" onclick="closeModal()">Continue shopping</button></div>`}render();
</script></body></html>
