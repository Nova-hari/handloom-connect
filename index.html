<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Handloom Connect — Admin Login</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f8f4ec;font-family:Inter,Segoe UI,Arial,sans-serif;color:#17232b}.box{width:min(390px,calc(100% - 36px));background:#fff;border:1px solid #dbe4e1;border-radius:16px;padding:30px;box-shadow:0 12px 35px #153a4a1d}.mark{display:grid;place-items:center;width:48px;height:48px;border-radius:12px;background:#087e72;color:#fff;font-weight:800;margin-bottom:18px}h1{font-size:23px;color:#153a4a;margin:0 0 6px}p{color:#617076;font-size:14px;line-height:1.5;margin:0 0 22px}label{display:block;font-size:13px;font-weight:700;color:#52616a;margin:13px 0 6px}input{width:100%;box-sizing:border-box;border:1px solid #cbd7d3;border-radius:8px;padding:11px;font:inherit}button{width:100%;margin-top:20px;background:#087e72;border:0;border-radius:8px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}.error{min-height:18px;margin-top:10px;color:#b23b32;font-size:13px;font-weight:700}a{display:block;text-align:center;margin-top:18px;color:#087e72;text-decoration:none;font-size:13px}</style></head><body><main class="box"><div class="mark">HC</div><h1>Admin login</h1><p>Log in to add and manage handloom products.</p><form id="login"><label for="username">Username</label><input id="username" autocomplete="username" required autofocus><label for="password">Password</label><input id="password" type="password" autocomplete="current-password" required><button>Log in</button><div id="error" class="error"></div></form><a href="handloom-connect-catalogue.html">← Back to customer catalogue</a></main><script>document.querySelector('#login').addEventListener('submit',e=>{e.preventDefault();if(username.value==='Hariharan'&&password.value==='Hari@2007'){sessionStorage.setItem('handloomAdmin','Hariharan');location.replace('handloom-connect-admin.html')}else{document.querySelector('#error').textContent='Incorrect username or password.';password.value='';password.focus()}})</script></body></html>
